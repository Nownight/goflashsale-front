<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xtp的小菜园 · Garden Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Noto+Serif+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --paper: #F5F1E8;
    --paper-2: #EDE7D7;
    --ink: #1A1A17;
    --ink-soft: #4A4A44;
    --ink-mute: #8A8A82;
    --rule: #1A1A1722;
    --rule-soft: #1A1A1711;
    --moss: oklch(0.48 0.08 140);
    --moss-soft: oklch(0.82 0.05 140);
    --earth: oklch(0.55 0.09 60);
    --serif: 'Fraunces', 'Noto Serif SC', Georgia, serif;
    --cn: 'Noto Serif SC', 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--serif); }
  body { font-feature-settings: "ss01", "ss02"; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--moss); color: var(--paper); }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input, textarea { font-family: inherit; color: inherit; }
  #root { min-height: 100vh; }

  /* ---------- reusable ---------- */
  .mono { font-family: var(--mono); letter-spacing: 0.02em; }
  .cn { font-family: var(--cn); }
  .rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }

  /* container */
  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 48px; }
  @media (max-width: 720px) { .wrap { padding: 0 24px; } }

  /* ---------- top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in oklab, var(--paper) 88%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule-soft);
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; cursor: pointer; }
  .brand-mark { width: 28px; height: 28px; display: inline-block; position: relative; top: 6px; }
  .brand-name {
    font-family: var(--serif);
    font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
    font-style: italic;
  }
  .brand-sub {
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.14em;
  }
  .nav { display: flex; gap: 36px; align-items: center; }
  .nav a, .nav button {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-soft);
    transition: color 0.2s;
  }
  .nav a:hover, .nav button:hover { color: var(--ink); }
  .nav .active { color: var(--ink); }
  .nav .pill {
    border: 1px solid var(--ink);
    padding: 8px 14px; border-radius: 999px;
    color: var(--ink);
    transition: background 0.2s, color 0.2s;
  }
  .nav .pill:hover { background: var(--ink); color: var(--paper); }
  .nav .pill.primary { background: var(--ink); color: var(--paper); }
  .nav .pill.primary:hover { background: var(--moss); border-color: var(--moss); }

  /* ---------- tools launcher ---------- */
  .tools-wrap { position: relative; }
  .tools-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--rule);
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .tools-btn:hover, .tools-btn.open { border-color: var(--ink); color: var(--ink); background: var(--paper-2); }
  .tools-btn svg { transition: transform 0.25s; }
  .tools-btn.open svg { transform: rotate(180deg); }
  .tools-menu {
    position: absolute; top: calc(100% + 10px); right: 0;
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 10px; padding: 8px;
    min-width: 280px;
    box-shadow: 0 20px 50px -15px #1a1a1733, 0 4px 12px -4px #1a1a1722;
    z-index: 50;
    display: none;
    animation: toolsDrop 0.24s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .tools-menu.open { display: block; }
  @keyframes toolsDrop {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tools-menu-head {
    padding: 10px 12px 10px;
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--rule-soft);
    margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
  .tools-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 12px; border-radius: 6px;
    text-align: left; width: 100%;
    transition: background 0.15s;
    cursor: pointer;
  }
  .tools-item:hover { background: var(--paper-2); }
  .tools-item-ico {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--paper-2); border: 1px solid var(--rule-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .tools-item-body { flex: 1; min-width: 0; }
  .tools-item-title {
    font-family: var(--serif); font-size: 15px;
    font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink); display: flex; align-items: center; gap: 8px;
  }
  .tools-item-title .cn { font-family: var(--cn); font-weight: 400; font-size: 14px; }
  .tools-item-sub {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-mute); letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: 2px;
  }
  .tools-item-arrow {
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-mute); opacity: 0; transition: opacity 0.2s, transform 0.2s;
  }
  .tools-item:hover .tools-item-arrow { opacity: 1; transform: translateX(3px); }
  .tools-menu-foot {
    margin-top: 4px; padding: 10px 12px;
    border-top: 1px solid var(--rule-soft);
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-mute); letter-spacing: 0.08em;
    display: flex; justify-content: space-between;
  }

  /* ---------- hero ---------- */
  .hero { padding: 80px 0 56px; position: relative; }
  .hero-meta {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding-bottom: 24px; border-bottom: 1px solid var(--rule);
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.14em;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(64px, 11vw, 176px);
    line-height: 0.88;
    letter-spacing: -0.035em;
    margin: 48px 0 0;
    font-weight: 300;
    font-variation-settings: "opsz" 144;
  }
  .hero h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--moss);
  }
  .hero-sub {
    margin-top: 36px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    padding-top: 28px; border-top: 1px solid var(--rule);
  }
  @media (max-width: 720px) {
    .hero-sub { grid-template-columns: 1fr; gap: 24px; }
  }
  .hero-sub .lead {
    font-size: 20px; line-height: 1.5; color: var(--ink-soft);
    font-family: var(--cn); font-weight: 300;
    text-wrap: pretty;
  }
  .hero-sub .stats { display: flex; flex-direction: column; gap: 16px; }
  .stat-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; }
  .stat-row .k { color: var(--ink-mute); text-transform: uppercase; }
  .stat-row .v { color: var(--ink); }

  /* ---------- filter bar ---------- */
  .filter {
    display: flex; gap: 4px; align-items: center;
    padding: 20px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-top: 72px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-mute); margin-right: 20px;
  }
  .chip {
    font-family: var(--mono); font-size: 12px;
    padding: 6px 14px; border-radius: 999px;
    color: var(--ink-soft);
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .chip:hover { color: var(--ink); }
  .chip.on { background: var(--ink); color: var(--paper); }
  .filter-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--rule); padding: 6px 12px; border-radius: 999px;
    background: transparent;
  }
  .search-box input {
    border: none; outline: none; background: transparent;
    font-family: var(--mono); font-size: 12px; width: 160px;
  }

  /* ---------- posts list ---------- */
  .posts { padding: 48px 0 120px; }
  .post {
    display: grid;
    grid-template-columns: 72px 280px 1fr auto;
    gap: 48px;
    padding: 48px 0;
    border-bottom: 1px solid var(--rule);
    align-items: start;
    cursor: pointer;
    position: relative;
    transition: background 0.25s;
  }
  .post:hover { background: linear-gradient(to right, transparent 0%, var(--paper-2) 8%, var(--paper-2) 92%, transparent 100%); }
  .post:hover .post-title { color: var(--moss); }
  .post:hover .post-arrow { transform: translateX(6px); }

  .post-num {
    font-family: var(--mono); font-size: 12px; color: var(--ink-mute);
    letter-spacing: 0.1em; padding-top: 6px;
  }
  .post-thumb {
    width: 280px; aspect-ratio: 4/3; border-radius: 4px;
    overflow: hidden; position: relative;
    background: var(--paper-2);
  }
  .post-thumb svg { display: block; width: 100%; height: 100%; }
  .post-body { padding-top: 0; min-width: 0; }
  .post-meta {
    display: flex; gap: 16px; align-items: center;
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 16px;
  }
  .post-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-mute); }
  .post-meta .tag { color: var(--moss); }
  .post-title {
    font-family: var(--serif);
    font-size: 40px; line-height: 1.04;
    letter-spacing: -0.022em;
    font-weight: 400;
    margin: 0 0 20px;
    text-wrap: balance;
    transition: color 0.25s;
  }
  .post-title .cn-part { font-family: var(--cn); font-weight: 400; letter-spacing: -0.01em; }
  .post-title em { font-style: italic; color: var(--moss); }
  .post-excerpt {
    font-family: var(--cn); font-weight: 300;
    font-size: 16px; line-height: 1.65;
    color: var(--ink-soft);
    max-width: 62ch;
    text-wrap: pretty;
  }
  .post-cta {
    align-self: start;
    padding-top: 10px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
  }
  .post-arrow {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s, background 0.2s;
  }
  .post:hover .post-arrow { background: var(--ink); color: var(--paper); }
  .post-read {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute);
  }

  @media (max-width: 900px) {
    .post { grid-template-columns: 40px 1fr; gap: 16px; }
    .post-thumb { display: none; }
    .post-cta { display: none; }
    .post-title { font-size: 28px; }
  }

  /* ---------- footer ---------- */
  footer {
    padding: 72px 0 48px;
    border-top: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
  }
  @media (max-width: 720px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
  .footer-title {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-mute); margin-bottom: 16px;
  }
  .footer-big {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: 56px; line-height: 1; letter-spacing: -0.03em;
    margin: 0;
  }
  .footer-list { display: flex; flex-direction: column; gap: 10px; }
  .footer-list a { font-family: var(--cn); font-size: 15px; color: var(--ink-soft); }
  .footer-list a:hover { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
  .footer-bottom {
    margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.14em;
  }

  /* ---------- modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: color-mix(in oklab, var(--ink) 40%, transparent);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fade 0.25s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: none; } }
  .modal {
    background: var(--paper);
    width: 460px; max-width: calc(100vw - 32px);
    padding: 48px;
    border-radius: 6px;
    border: 1px solid var(--rule);
    box-shadow: 0 30px 80px -20px #1a1a1733;
    animation: pop 0.3s ease;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-mute);
    transition: background 0.2s, color 0.2s;
  }
  .modal-close:hover { background: var(--paper-2); color: var(--ink); }
  .modal-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--moss); margin-bottom: 12px; }
  .modal-title {
    font-family: var(--serif); font-size: 36px; line-height: 1;
    letter-spacing: -0.03em; font-weight: 400;
    margin: 0 0 8px;
  }
  .modal-title em { font-style: italic; }
  .modal-sub {
    font-family: var(--cn); font-weight: 300;
    color: var(--ink-soft); font-size: 14px; line-height: 1.5;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    padding: 12px 0; border: none;
    border-bottom: 1px solid var(--rule);
    background: transparent; outline: none;
    font-family: var(--serif); font-size: 18px; color: var(--ink);
    transition: border-color 0.2s;
  }
  .field input:focus { border-bottom-color: var(--ink); }
  .btn-primary {
    width: 100%;
    background: var(--ink); color: var(--paper);
    padding: 14px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: background 0.2s;
    margin-top: 12px;
  }
  .btn-primary:hover { background: var(--moss); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .form-hint {
    font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
    text-align: center; margin-top: 16px; letter-spacing: 0.05em;
  }
  .form-hint code { background: var(--paper-2); padding: 2px 6px; border-radius: 3px; color: var(--ink); }
  .form-error { color: #a43f2a; font-family: var(--mono); font-size: 11px; margin-top: 10px; }

  /* ---------- composer ---------- */
  .composer { padding: 48px 0 120px; min-height: calc(100vh - 80px); }
  .composer-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 20px; border-bottom: 1px solid var(--rule);
    margin-bottom: 40px;
  }
  .composer-bar .left {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-mute);
  }
  .composer-bar .left .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--moss); margin-right: 8px; vertical-align: middle;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .composer-actions { display: flex; gap: 8px; }
  .btn-ghost {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; padding: 10px 18px; border-radius: 999px;
    border: 1px solid var(--rule); color: var(--ink-soft);
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
  .btn-solid {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; padding: 10px 18px; border-radius: 999px;
    background: var(--ink); color: var(--paper);
  }
  .btn-solid:hover { background: var(--moss); }

  .compose-grid { display: grid; grid-template-columns: 1fr 320px; gap: 64px; }
  @media (max-width: 900px) { .compose-grid { grid-template-columns: 1fr; } }
  .compose-input {
    width: 100%;
    border: none; background: transparent; outline: none;
    font-family: var(--serif); color: var(--ink);
    resize: none; display: block;
  }
  .compose-input.title {
    font-size: 64px; line-height: 1.02; letter-spacing: -0.03em;
    font-weight: 300; font-variation-settings: "opsz" 144;
    margin-bottom: 8px; padding: 0;
  }
  .compose-input.title::placeholder { color: #1a1a1733; font-style: italic; }
  .compose-input.excerpt {
    font-family: var(--cn); font-weight: 300; font-size: 18px;
    line-height: 1.5; color: var(--ink-soft);
    margin-bottom: 36px; padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .compose-input.excerpt::placeholder { color: var(--ink-mute); }
  .compose-input.body {
    font-family: var(--cn); font-weight: 400; font-size: 17px;
    line-height: 1.8; color: var(--ink); min-height: 400px;
  }
  .compose-input.body::placeholder { color: var(--ink-mute); }

  .compose-side { display: flex; flex-direction: column; gap: 28px; }
  .side-block { border-top: 1px solid var(--rule); padding-top: 20px; }
  .side-label {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-mute); margin-bottom: 12px;
  }
  .side-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .side-tag {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: 999px;
    border: 1px solid var(--rule); color: var(--ink-soft);
    transition: all 0.2s;
  }
  .side-tag.on { background: var(--moss); color: var(--paper); border-color: var(--moss); }
  .side-tag:hover:not(.on) { border-color: var(--ink); color: var(--ink); }
  .side-thumb-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .side-thumb {
    aspect-ratio: 4/3; border-radius: 4px; overflow: hidden;
    border: 2px solid transparent; cursor: pointer;
    transition: border-color 0.2s;
  }
  .side-thumb.on { border-color: var(--ink); }
  .side-thumb svg { width: 100%; height: 100%; display: block; }
  .count-readout {
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    display: flex; justify-content: space-between;
  }

  /* ---------- detail ---------- */
  .detail { padding: 56px 0 120px; }
  .detail-back {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--ink-mute); display: inline-flex;
    gap: 8px; align-items: center; margin-bottom: 48px;
  }
  .detail-back:hover { color: var(--ink); }
  .detail-meta {
    display: flex; gap: 16px; align-items: center;
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);

  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
    const onEsc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onEsc);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      document.removeEventListener("keydown", onEsc);
    };
  }, [open]);

  return (
    <div className="tools-wrap" ref={wrapRef}>

========================================================= */
function LoginModal({ onClose, onSuccess }) {
  const [name, setName] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const submit = (e) => {
    e.preventDefault();
    setErr("");
    if (!name.trim()) { setErr("请输入用户名"); return; }
    setLoading(true);
    setTimeout(() => {
      if (pw !== "garden") {
        setErr("密码不对。提示见下方。");
        setLoading(false);
        return;
      }
      onSuccess({ name: name.trim() });
    }, 500);
  };

  return (
    <div className="modal-backdrop" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
            <path d="M6 6l12 12M6 18L18 6"/>
          </svg>
        </button>
        <div className="modal-label">Gardener's entrance</div>
        <h2 className="modal-title">Sign <em>in</em>.</h2>
        <p className="modal-sub">只有菜园的主人才能播下新的文章。</p>
        <form onSubmit={submit}>
          <div className="field">
            <label>Name</label>
            <input ref={inputRef} value={name} onChange={e => setName(e.target.value)} placeholder="xtp" />
          </div>
          <div className="field">
            <label>Passphrase</label>
            <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••" />
          </div>
          {err && <div className="form-error">{err}</div>}
          <button className="btn-primary" disabled={loading}>{loading ? "Checking..." : "Enter the garden →"}</button>
          <div className="form-hint">Demo passphrase — <code>garden</code></div>
        </form>
      </div>
    </div>
  );
}

/* =========================================================
   COMPOSER
========================================================= */
function Composer({ user, onPublish, onCancel }) {
  const [title, setTitle] = useState("");
  const [excerpt, setExcerpt] = useState("");
  const [body, setBody] = useState("");
  const [tag, setTag] = useState("田间笔记");
  const [thumb, setThumb] = useState(99);

  const wordCount = (body || "").length;
  const canPublish = title.trim() && body.trim();

  const publish = () => {
    if (!canPublish) return;
    const now = new Date();
    const month = now.toLocaleString('en', { month: 'short' });
    const post = {
      id: Date.now(),
      date: `${month}, ${now.getFullYear()}`,
      dateShort: `${String(now.getMonth() + 1).padStart(2, "0")}.${now.getFullYear()}`,
      title: title.trim(),
      titleEn: "NEW ENTRY",
      tag,
      read: `${Math.max(1, Math.round(wordCount / 250))} min`,
      excerpt: excerpt.trim() || body.slice(0, 120),
      body: body.split(/\n+/).filter(Boolean)
    };
    onPublish(post);
  };

  return (
    <section className="wrap composer">
      <div className="composer-bar">
        <div className="left">
          <span className="dot"></span>
          Drafting · Signed in as <span style={{color:'var(--ink)'}}>{user.name}</span>
        </div>
        <div className="composer-actions">
          <button className="btn-ghost" onClick={onCancel}>Discard</button>
          <button className="btn-solid" onClick={publish} disabled={!canPublish} style={{opacity: canPublish ? 1 : 0.35, cursor: canPublish ? 'pointer' : 'not-allowed'}}>
            Plant entry →
          </button>
        </div>
      </div>
      <div className="compose-grid">
        <div>
          <textarea
            className="compose-input title"
            rows={2}
            placeholder="A title, slow and simple..."
            value={title}
            onChange={e => setTitle(e.target.value)}
          />
          <textarea
            className="compose-input excerpt"
            rows={2}
            placeholder="一段简短的摘要 · a one-line excerpt"
            value={excerpt}
            onChange={e => setExcerpt(e.target.value)}
          />
          <textarea
            className="compose-input body"
            rows={18}
            placeholder="写下今天的菜园笔记。换行即分段。&#10;&#10;今天天气——&#10;种了什么——&#10;观察到什么——"
            value={body}
            onChange={e => setBody(e.target.value)}
          />
        </div>
        <aside className="compose-side">
          <div className="side-block" style={{borderTop:'none', paddingTop:0}}>
            <div className="side-label">Category</div>
            <div className="side-tags">
              {CATEGORIES.filter(c => c !== "全部").map(c => (
                <button key={c} className={`side-tag ${tag === c ? "on" : ""}`} onClick={() => setTag(c)}>{c}</button>
              ))}
            </div>
          </div>
          <div className="side-block">
            <div className="side-label">Cover · placeholder pattern</div>
            <div className="side-thumb-picker">
              {[0,1,2,3,4,5].map(i => (
                <div key={i} className={`side-thumb ${thumb === i ? "on" : ""}`} onClick={() => setThumb(i)}>
                  <PlaceholderThumb seed={i} label="COVER" />
                </div>
              ))}
            </div>
          </div>
          <div className="side-block">
            <div className="side-label">Read-out</div>
            <div className="count-readout"><span>Characters</span><span>{wordCount}</span></div>
            <div className="count-readout"><span>Est. read</span><span>{Math.max(1, Math.round(wordCount / 250))} min</span></div>
            <div className="count-readout"><span>Paragraphs</span><span>{body.split(/\n+/).filter(Boolean).length}</span></div>
          </div>
          <div className="side-block">
            <div className="side-label">Publishing to</div>
            <div style={{fontFamily:'var(--serif)', fontStyle:'italic', fontSize: 22, letterSpacing:'-0.02em'}}>
              xtp的小菜园
            </div>
            <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-mute)', marginTop: 6, letterSpacing:'0.1em'}}>
              JOURNAL № 01 · PUBLIC
            </div>
          </div>
        </aside>
      </div>
    </section>
  );
}

/* =========================================================
   FOOTER
========================================================= */
function Footer() {
  return (
    <footer>
      <div className="wrap">
        <div className="footer-grid">
          <div>
            <div className="footer-title">Correspondence</div>
            <p className="footer-big">Hello <em>from</em><br/>the garden.</p>
          </div>
          <div>
            <div className="footer-title">Pages</div>
            <div className="footer-list">
              <a>Journal</a><a>About</a><a>Archive</a><a>Plant list</a>
            </div>
          </div>
          <div>

            <div className="footer-title">Colophon</div>

}

/* =========================================================
   ROOT APP
========================================================= */
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem("garden.user")) || null; } catch { return null; }
  });
  const [posts, setPosts] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("garden.posts"));
      return saved && Array.isArray(saved) ? saved : INITIAL_POSTS;
    } catch { return INITIAL_POSTS; }
  });
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem("garden.route")) || { name: "index" }; } catch { return { name: "index" }; }
  });
  const [showLogin, setShowLogin] = useState(false);
  const [pendingCompose, setPendingCompose] = useState(false);

  useEffect(() => { localStorage.setItem("garden.user", JSON.stringify(user)); }, [user]);
  useEffect(() => { localStorage.setItem("garden.posts", JSON.stringify(posts)); }, [posts]);
  useEffect(() => {
    localStorage.setItem("garden.route", JSON.stringify(route));
    window.scrollTo({ top: 0, behavior: "auto" });
  }, [route]);

  const handleCompose = () => {
    if (user) setRoute({ name: "compose" });
    else { setPendingCompose(true); setShowLogin(true); }
  };

  const handleLoginSuccess = (u) => {
    setUser(u);
    setShowLogin(false);
    if (pendingCompose) {
      setPendingCompose(false);
      setRoute({ name: "compose" });
    }
  };

  const handleLogout = () => {
    setUser(null);
    if (route.name === "compose") setRoute({ name: "index" });
  };

  const handlePublish = (p) => {
    setPosts(prev => [p, ...prev]);
    setRoute({ name: "detail", id: p.id });
  };

  const detailPost = route.name === "detail" ? posts.find(x => x.id === route.id) : null;

  return (
    <>
      <TopBar
        user={user}
        route={route}
        setRoute={setRoute}
        onLogin={() => setShowLogin(true)}
        onLogout={handleLogout}
        onCompose={handleCompose}
      />
      {route.name === "index" && <IndexPage posts={posts} setRoute={setRoute} />}
      {route.name === "detail" && <DetailPage post={detailPost} setRoute={setRoute} />}
      {route.name === "compose" && user && <Composer user={user} onPublish={handlePublish} onCancel={() => setRoute({ name: "index" })} />}
      {showLogin && <LoginModal onClose={() => { setShowLogin(false); setPendingCompose(false); }} onSuccess={handleLoginSuccess} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
