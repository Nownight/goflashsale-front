<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal · xtp Workspace</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div id="nav"></div>
<script src="_nav.js" data-active="portal"></script>

<main class="page">
  <header class="page-hero fade-in">
    <h1>选你所爱。<span class="mute">两个空间，一键切换。</span></h1>
    <p class="subtitle">Pick a lane. 商店用来消费，工作台用来创造。</p>
  </header>

  <section class="bento-grid">
    <div class="bento-card clickable fade-in" onclick="location.href='shop.html'" style="padding: 44px 32px;">
      <div style="font-size: 56px; margin-bottom: 18px;">🧋</div>
      <h2 style="margin:0 0 8px; font-size:26px; letter-spacing:-0.01em;">Boba Store</h2>
      <p style="margin:0 0 24px; color: var(--text-mute); line-height:1.5;">
        探索最新发售的云端饮品。<br/>选购、下单，快人一步。
      </p>
      <span class="badge live">● Live · 实时库存</span>
    </div>

    <div class="bento-card clickable fade-in" onclick="location.href='workspace.html'" style="padding: 44px 32px;">
      <div style="font-size: 56px; margin-bottom: 18px;">🛠️</div>
      <h2 style="margin:0 0 8px; font-size:26px; letter-spacing:-0.01em;">Pro Workspace</h2>
      <p style="margin:0 0 24px; color: var(--text-mute); line-height:1.5;">
        你的私人生产力中心。<br/>搭载大模型 AI 引擎。
      </p>
      <span class="badge">AI · GPT / DeepSeek / MiniMax</span>
    </div>

    <div class="bento-card clickable fade-in" onclick="location.href='orders.html'" style="padding: 44px 32px;">
      <div style="font-size: 56px; margin-bottom: 18px;">🧾</div>
      <h2 style="margin:0 0 8px; font-size:26px; letter-spacing:-0.01em;">我的订单</h2>
      <p style="margin:0 0 24px; color: var(--text-mute); line-height:1.5;">
        历史交易、流水、购买记录。<br/>一目了然。
      </p>
      <span class="badge">Records</span>
    </div>

    <div class="bento-card clickable fade-in" onclick="location.href='../小菜园.html'" style="padding: 44px 32px;">
      <div style="font-size: 56px; margin-bottom: 18px;">🌱</div>
      <h2 style="margin:0 0 8px; font-size:26px; letter-spacing:-0.01em;">小菜园</h2>
      <p style="margin:0 0 24px; color: var(--text-mute); line-height:1.5;">
        回到主站——植物日志、随笔、月度记录。
      </p>
      <span class="badge" style="background: rgba(90,160,100,0.15); color: #77c38a;">Journal № 01</span>
    </div>
  </section>
</main>
</body>
</html>
